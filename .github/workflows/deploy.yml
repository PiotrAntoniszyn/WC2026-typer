name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Mikrus często używa niestandardowego portu, pobieramy go z sekretów (domyślnie 22, jeśli nie ustawiono)
          SSH_PORT=${{ secrets.VPS_PORT || 22 }}
          ssh-keyscan -p $SSH_PORT -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        run: |
          SSH_PORT=${{ secrets.VPS_PORT || 22 }}
          ssh -i ~/.ssh/deploy_key \
            -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/wc2026 && bash -l deploy.sh"
